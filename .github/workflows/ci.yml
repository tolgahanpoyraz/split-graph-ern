name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ubuntu's nauty packaging is inconsistent across releases (no dev package
      # on noble), so build nauty from source. This yields the gtools with plain
      # names (geng, labelg, ...) plus nauty.h and the static library.
      - name: Build and install nauty
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y build-essential
          ver=nauty2_8_8
          curl -fsSL "https://pallini.di.uniroma1.it/${ver}.tar.gz" -o nauty.tar.gz
          tar xzf nauty.tar.gz
          cd "$ver"
          ./configure
          make -j"$(nproc)"
          sudo install -m 0755 geng genbg labelg shortg /usr/local/bin/
          sudo cp ./*.h /usr/local/include/
          sudo install -m 0644 nauty.a /usr/local/lib/libnauty.a
          sudo ranlib /usr/local/lib/libnauty.a
          command -v geng genbg labelg shortg

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Build C++ tools
        # nauty.a is non-PIC, so link the dern executable as non-PIE.
        run: >
          make -C cpp
          CXXFLAGS="-O2 -Wall -Wextra -std=c++20 -no-pie"
          NAUTY_CFLAGS="-I/usr/local/include"
          NAUTY_LIBS="-L/usr/local/lib -lnauty"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test
        run: uv run pytest -q
