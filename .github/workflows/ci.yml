name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nauty (tools + headers)
        run: |
          sudo apt-get update
          sudo apt-get install -y nauty libnauty2-dev
          # Debian/Ubuntu prefix the binaries (nauty-geng, ...); expose plain names.
          for t in geng labelg shortg genbg; do
            if command -v "nauty-$t" >/dev/null; then
              sudo ln -sf "$(command -v "nauty-$t")" "/usr/local/bin/$t"
            fi
          done
          command -v geng labelg shortg genbg

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Build C++ tools
        run: |
          NAUTY_H="$(find /usr/include -name nauty.h 2>/dev/null | head -1)"
          echo "nauty.h: ${NAUTY_H:-not found}"
          make -C cpp NAUTY_CFLAGS="-I$(dirname "$NAUTY_H")" NAUTY_LIBS="-lnauty"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Test
        run: uv run pytest -q
